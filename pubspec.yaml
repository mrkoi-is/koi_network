name: koi_network
description: >
  Enterprise-grade network library built on Dio with configurable response
  parsing, request encoding, token refresh, retry, caching, and adapter-based
  architecture.
version: 0.2.0
homepage: https://github.com/JieJing/jiejing/tree/main/packages/koi_network
repository: https://github.com/JieJing/jiejing/tree/main/packages/koi_network
issue_tracker: https://github.com/JieJing/jiejing/issues
resolution: workspace

topics:
  - dio
  - http
  - networking
  - interceptors
  - api

environment:
  sdk: "^3.9.2"

dependencies:
  dio: ^5.8.0
  dio_cache_interceptor: ^4.0.5
  dio_smart_retry: ^7.0.1
  pretty_dio_logger: ^1.4.0

dev_dependencies:
  fake_async: ^1.3.0
  http_mock_adapter: ^0.6.0
  mocktail: ^1.0.0
  test: any
  very_good_analysis: ^7.0.0
